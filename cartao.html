<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:        #b97a7a;
    --rose-mid:    #c98f8f;
    --rose-light:  #ddb8b8;
    --rose-pale:   #f4e8e8;
    --rose-bg:     #fdf6f6;
    --text-dark:   #2e1f1f;
    --text-mid:    #6b4a4a;
    --text-light:  #9e7575;
    --white:       #ffffff;
  }

  html, body {
    min-height: 100%;
    background: var(--rose-bg);
    font-family: 'Raleway', sans-serif;
    color: var(--text-dark);
    -webkit-font-smoothing: antialiased;
  }

  /* ── PAGE LAYOUT ── */
  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    position: relative;
    overflow: hidden;
  }

  /* subtle background pattern */
  .page::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(185,122,122,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(185,122,122,0.05) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── CARD ── */
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    background: var(--white);
    border: 1px solid var(--rose-light);
    border-radius: 20px;
    padding: 2.5rem 2rem 2rem;
    box-shadow: 0 4px 40px rgba(185,122,122,0.10), 0 1px 4px rgba(185,122,122,0.08);
  }

  /* top accent bar */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 2rem; right: 2rem;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--rose-light), var(--rose), var(--rose-light), transparent);
    border-radius: 0 0 2px 2px;
  }

  /* ── HEADER ── */
  .card-header {
    display: flex;
    align-items: center;
    gap: 1.25rem;
    margin-bottom: 1.75rem;
  }

  .avatar {
    flex-shrink: 0;
    width: 64px;
    height: 64px;
  }

  .card-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 400;
    color: var(--text-dark);
    line-height: 1.05;
    letter-spacing: 0.01em;
  }

  .card-tagline {
    font-size: 8.5px;
    letter-spacing: 0.22em;
    color: var(--rose);
    text-transform: uppercase;
    margin-top: 4px;
    font-weight: 500;
  }

  .card-om {
    font-size: 10px;
    letter-spacing: 0.08em;
    color: var(--text-light);
    margin-top: 2px;
    font-weight: 400;
  }

  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.25rem;
  }
  .divider-line { flex: 1; height: 1px; background: var(--rose-pale); }
  .divider-dot  { width: 4px; height: 4px; border-radius: 50%; background: var(--rose-light); flex-shrink: 0; }

  /* ── SPECIALTIES ── */
  .specialties {
    text-align: center;
    font-size: 9px;
    letter-spacing: 0.18em;
    color: var(--text-mid);
    text-transform: uppercase;
    font-weight: 500;
    line-height: 2;
    margin-bottom: 1.75rem;
  }

  /* ── CONTACTS ── */
  .contacts {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 1.75rem;
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: var(--text-mid);
    font-size: 13px;
    font-weight: 400;
    transition: color 0.15s;
    line-height: 1.3;
  }
  .contact-row:hover { color: var(--rose); }

  .contact-icon {
    flex-shrink: 0;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--rose-pale);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .contact-icon svg {
    width: 15px;
    height: 15px;
    stroke: var(--rose);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── BUTTONS ── */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 1.75rem;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    padding: 11px 10px;
    border-radius: 10px;
    border: 1px solid var(--rose-light);
    background: var(--rose-pale);
    color: var(--rose);
    font-family: 'Raleway', sans-serif;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-appearance: none;
  }
  .btn:hover { background: var(--rose-light); border-color: var(--rose); }
  .btn:active { transform: scale(0.97); }

  .btn svg {
    width: 15px; height: 15px;
    stroke: currentColor; fill: none;
    stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
    flex-shrink: 0;
  }

  .btn-primary {
    background: var(--rose);
    color: var(--white);
    border-color: var(--rose);
  }
  .btn-primary:hover { background: #a86868; border-color: #a86868; }

  /* ── QR SECTION ── */
  .qr-section {
    display: flex;
    align-items: center;
    gap: 16px;
    border-top: 1px solid var(--rose-pale);
    padding-top: 1.25rem;
  }

  #qr-wrap {
    flex-shrink: 0;
    padding: 6px;
    border: 1px solid var(--rose-light);
    border-radius: 10px;
    background: var(--white);
    line-height: 0;
  }
  #qr-wrap canvas, #qr-wrap img { border-radius: 5px; display: block; }

  .qr-info {}
  .qr-label {
    font-size: 8.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--rose);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .qr-desc {
    font-size: 11px;
    color: var(--text-mid);
    line-height: 1.5;
  }
  .qr-pw {
    font-size: 9.5px;
    color: var(--text-light);
    margin-top: 3px;
    letter-spacing: 0.04em;
  }

  /* ── BACK LINK ── */
  .back-link {
    position: relative;
    z-index: 1;
    margin-top: 1.5rem;
    display: flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    color: var(--text-light);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 500;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--rose); }
  .back-link svg {
    width: 13px; height: 13px;
    stroke: currentColor; fill: none;
    stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--text-dark);
    color: var(--white);
    padding: 9px 22px;
    border-radius: 30px;
    font-size: 12px;
    font-family: 'Raleway', sans-serif;
    font-weight: 500;
    letter-spacing: 0.04em;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 440px) {
    .card { padding: 2rem 1.5rem 1.75rem; border-radius: 16px; }
    .card-name { font-size: 1.75rem; }
  }

  /* ── LANG BADGE ── */
  .lang-badge {
    position: fixed;
    top: 14px;
    right: 16px;
    z-index: 999;
    display: flex;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(6px);
    border: 1px solid var(--rose-light);
    border-radius: 20px;
    padding: 3px;
  }
  .lang-btn {
    background: none;
    border: none;
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: .1em;
    color: var(--text-light);
    cursor: pointer;
    padding: 5px 11px;
    border-radius: 16px;
    transition: all .2s;
  }
  .lang-btn.on { background: var(--rose); color: #fff; }

</style>
</head>

<script>
  // ── QR Code
  new QRCode(document.getElementById('qr-wrap'), {
    text: 'https://marianalourenco.pt',
    width: 72,
    height: 72,
    colorDark: '#2e1f1f',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  // ── Toast
  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(function() { t.classList.remove('show'); }, 2800);
  }

  // ── vCard download
  function downloadVCard() {
    var vcf = [
      'BEGIN:VCARD',
      'VERSION:3.0',
      'FN:Mariana Lourenço',
      'N:Lourenço;Mariana;;;Dr.',
      'TITLE:Ginecologista / Obstetra',
      'ORG:marianalourenco.pt',
      'TEL;TYPE=CELL,VOICE:+351914779655',
      'EMAIL;TYPE=WORK:consulta@marianalourenco.pt',
      'URL:https://marianalourenco.pt',
      'NOTE:OM 63637 · Ginecologia · Obstetrícia · Medicina da Reprodução',
      'END:VCARD'
    ].join('\r\n');

    var blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href     = url;
    a.download = 'Mariana_Lourenco.vcf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Contacto guardado ✓');
  }

  // ── Share / copy
  async function shareCard() {
    var data = {
      title: 'Dra. Mariana Lourenço',
      text:  'Ginecologia · Obstetrícia · Medicina da Reprodução\n+351 914 779 655\nconsulta@marianalourenco.pt',
      url:   'https://marianalourenco.pt/cartao'
    };
    if (navigator.share && navigator.canShare && navigator.canShare(data)) {
      try {
        await navigator.share(data);
      } catch(e) { /* cancelado pelo utilizador */ }
    } else {
      try {
        await navigator.clipboard.writeText(
          'Dra. Mariana Lourenço\n' +
          'Ginecologia · Obstetrícia · Medicina da Reprodução\n' +
          '+351 914 779 655\n' +
          'consulta@marianalourenco.pt\n' +
          'https://marianalourenco.pt/cartao'
        );
        showToast('Copiado para a área de transferência ✓');
      } catch(e) {
        showToast('Copia o link: marianalourenco.pt/cartao');
      }
    }
  }
</script>

<script>
function setLang(lang) {
  // botões
  document.getElementById('btn-pt').classList.toggle('on', lang === 'pt');
  document.getElementById('btn-en').classList.toggle('on', lang === 'en');
  
  // elementos simples data-pt / data-en
  document.querySelectorAll('[data-pt],[data-en]').forEach(function(el) {
    var val = el.getAttribute('data-' + lang);
    if (val !== null) el.textContent = val;
  });
  
  // elementos com HTML data-pt-html / data-en-html
  document.querySelectorAll('[data-pt-html],[data-en-html]').forEach(function(el) {
    var val = el.getAttribute('data-' + lang + '-html');
    if (val !== null) el.innerHTML = val;
  });

  // toast
  document.getElementById('toast').textContent = '';

  // atualizar aria-labels e toasts dinamicamente
  localStorage.setItem('cartao-lang', lang);
}

// restaurar língua guardada
(function() {
  var saved = localStorage.getItem('cartao-lang');
  if (saved && saved !== 'pt') setLang(saved);
})();
</script>
